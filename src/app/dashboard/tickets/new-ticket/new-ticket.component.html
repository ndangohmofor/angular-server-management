<form>
  <p>
    <label for="title">Title</label>
    <input type="text" name="title" id="title" placeholder="Ticket title" />
  </p>
  <p>
    <label>Request</label>
    <textarea
      name="request"
      id="request"
      rows="3"
      placeholder="Describe your request here..."
    ></textarea>
  </p>
  <p>
    <button type="submit">
      <span>Submit</span>
      <span class="icon"> → </span>
    </button>
  </p>
</form>
